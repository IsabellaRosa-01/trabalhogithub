name: Integration CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install pylint
        run: python -m pip install pylint

      - name: Run pylint
        run: pylint *.py --disable=C0114,C0116,C0304,W0611



  discord:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Update Welcome
        uses: luludotdev/discord-welcome-action@v1
        with:
          content: ./content
          discord-token: ${{ secrets.DISCORD_WELCOME_ACTION }}
        

        



 
     

     
