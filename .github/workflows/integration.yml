name: Integration CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install pylint
        run: python -m pip install pylint

      - name: Run pylint
        run: pylint *.py --disable=C0114,C0116,C0304,W0611
      - name: Run Tests
        run: python -m unittest discover
      - name: Run Tests
        run: python -m unittest discover