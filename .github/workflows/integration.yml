name: Integration CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Install pylint
        run: python -m pip install pylint

      - name: Run Linter
        run: |
          python -m pip install pylint
          pylint src
      - name: Run Tests
        run: python -m unittest discover -s tests -p "test_*.py"


        

        



 
     

     
