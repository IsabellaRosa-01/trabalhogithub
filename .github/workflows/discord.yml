name: Discord Notification

on:
  workflow_run:
    workflows: ["Integration CI"]
    types:
      - completed

jobs:
  discord:
    runs-on: ubuntu-latest

    steps:
      - name: Notificar sucesso
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"✅ CI aprovado!\nBranch: ${{ github.event.workflow_run.head_branch }}\nCommit: ${{ github.event.workflow_run.head_sha }}\"}"

      - name: Notificar falha
        if: ${{ github.event.workflow_run.conclusion == 'failure' }}
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d "{\"content\": \"❌ CI FALHOU!\nBranch: ${{ github.event.workflow_run.head_branch }}\nCommit: ${{ github.event.workflow_run.head_sha }}\"}"